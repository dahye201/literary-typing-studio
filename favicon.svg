  <rect x="19" y="19" width="3" height="2.5" rx="0.5" fill="#3a3530" stroke="#c8a870" stroke-width="0.4"/>
  <rect x="23" y="19" width="2" height="2.5" rx="0.5" fill="#3a3530" stroke="#c8a870" stroke-width="0.4"/>
